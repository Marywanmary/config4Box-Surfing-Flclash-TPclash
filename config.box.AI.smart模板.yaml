# ======================================================
# 🔌 面向新手的使用指南（面板开关 vs 配置文件）
# ======================================================
# ❓ 核心疑问：如果我在手机 App（如 FlClash）或电脑面板上切换了 TUN / TProxy / Redirect / Mixed / Enhance 等模式，我需要回来修改下面这些代码吗？
# 💡 终极答案：【绝对不需要修改任何一行代码！】
#
# 📖 原理说明：
# 这份配置文件的“底子”已经打得完美且全能。这里的代码相当于预先造好了所有模式的“大门”（开放了相应的端口和规则）。
# 当你在 GUI 界面上拨动模式开关时，App 会直接通过底层 API 在【内存】中发号施令，把流量精准导向对应的门。它无需篡改这里的 YAML 文本。
#
# 1. 关于 TUN 模式（虚拟网卡）：
# 看到下方写着 `tun: enable: false` 不要惊慌。这是为了保护底层 Root 玩家防止“双重劫持冲突”。作为普通用户，只要你在 App 界面上点击开启 VPN，App 就会在运行内存里强行拉起虚拟网卡，稳稳接住你的所有流量。下方代码一个字都不用改。
#
# 2. 关于 Mixed 模式（局域网共享/主机加速）：
# 预设已完美开启 `allow-lan: true` 和端口 `7890`。如果你需要给同一 WiFi 下的 Switch 或 PC 共享网络，直接在对方设备填入本机内网 IP 和 7890 端口即可。
#
# 3. 关于 ENHANCE（DNS Fake-IP 模式）：
# 预设已在底层开启。全权由你的面板“代理模式”调度：面板切到“规则/全局”时，它自动发威秒开网页；面板切“直连”时，它自动休眠。
#
# 4. 关于 TProxy / Redirect 模式（高级 Root 劫持）：
# 预设接管端口已备好（9898 / 7892）。无论 Box for Root / Surfing 脚本推哪种底层的防火墙流量进来，内核都能开门放行。
# ======================================================
tproxy-port: 9898     # 【TProxy 关键端口】Box for Root/Surfing 默认依赖此端口。
# tproxy-port: 7895     # 【TProxy 关键端口】ShellCrash 默认依赖此端口，切换ShellCrash请调整该端口号。
redir-port: 7892      # 【Redirect 关键端口】若 Box 切 Redirect 模式，依赖此端口。
mixed-port: 7890      # 【混合端口】同时提供 HTTP 和 SOCKS5。可供局域网其他设备接入。
port: 8080
socks-port: 1080
ipv6: true            # 全局 IPv6 开关
mode: Rule            # 运行模式: 规则模式 (Rule)
log-level: warning    # 日志等级: warning (日常建议)
unified-delay: true   # 统一延迟计算
tcp-concurrent: true  # TCP 并发连接测试，大幅加速网页加载
allow-lan: true       # 允许局域网设备连接
external-controller: 0.0.0.0:9090 # 控制面板接口
external-ui: ./ui/
external-ui-url: "https://github.boki.moe/https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip"
secret: ""
skip-auth-prefixes:   # [修正]: 严谨的 CIDR 子网掩码书写规范
- 10.0.0.0/8
- 127.0.0.1/8
- 192.168.0.0/16

# ======================================================
# 🧠 引擎数据库与模型自动更新
# ======================================================
geo-auto-update: true
geo-update-interval: 168 # 7天更新一次 Geo 库
geox-url:
  asn: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

lgbm-auto-update: true
lgbm-update-interval: 360 # 15天更新一次机器学习模型
lgbm-url: "https://github.boki.moe/https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin"

profile:
  store-selected: true      # 记忆手动选择的节点
  store-fake-ip: true       # 保留 Fake-IP 映射，防断连
  smart-collector-size: 100 # LightGBM 数据池大小

ntp:
  enable: true
  write-to-system: false    # 仅内部对时，不修改安卓系统时间
  server: time.apple.com
  port: 123
  interval: 30

# ======================================================
# 🕵️ 流量嗅探 (Sniffer) - 解决透明代理 DNS 泄露
# ======================================================
sniffer:
  enable: true
  force-dns-mapping: true   # 强制将 Fake-IP 映射回真实域名，解决 SNI 验证问题
  parse-pure-ip: true       # 尝试对直接使用 IP 请求的流量嗅探出域名
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 5228-5230, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain: ["+.v2ex.com"]
skip-domain:               # 跳过内网域名
- "+.local"
- "+.lan"
- "localhost"
- "Mijia Cloud"
- "miwifi.com"

# ======================================================
# 🌐 TUN 模式配置区 (虚拟网卡模式)
# ======================================================
tun:
  enable: false
  device: Mihomo
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-detect-interface: true
  strict-route: true

# ======================================================
# 📡 DNS 解析模块 (Fake-IP Enhance 模式)
# ======================================================
dns:
  enable: true
  listen: :1053
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fdfe:dcba:9876::/64
  fake-ip-filter-mode: rule
  fake-ip-filter:
  - RULE-SET,private,real-ip
  - RULE-SET,ntp,real-ip
  - RULE-SET,googlefcm,real-ip
  - RULE-SET,directs,real-ip
  - RULE-SET,cn,real-ip
  - MATCH,fake-ip
  cndns: &cndns
  - 223.5.5.5
  - 223.6.6.6
  - "2400:3200::1"
  - "2400:3200:baba::1"
  cndoh: &cndoh
  - 'quic://dns.alidns.com#🟢 直连'
  - 'https://dns.alidns.com/dns-query#🟢 直连'
  cgdoh: &cgdoh
  - 'https://dns.google/dns-query#DNServer'
  - 'https://cloudflare-dns.com/dns-query#DNServer'
  default-nameserver: *cndns
  direct-nameserver: *cndns
  proxy-server-nameserver: *cndoh
  nameserver-policy:
    'RULE-SET:ads-awavenue,ads-mrxx007,ads-all,rejects': rcode://name_error
#     'RULE-SET:ads-awavenue,ads-mrxx007,ads-all,ads-blackmatrix7,rejects': rcode://name_error
    'RULE-SET:cn,apple,microsoft,directs': *cndoh
  nameserver: *cgdoh

