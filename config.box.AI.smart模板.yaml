# ======================================================
# 🚦 流量路由规则 (Rules) - 优先级自上而下，匹配即停
# ======================================================
rules:
# 1. 基础防漏与劫持
- DST-PORT,53/853/8853,⭕️ DNS_Hijack           # 将发往传统及加密 DNS 端口的查询劫持到内核解析
- AND,((NETWORK,udp),(DST-PORT,3478-3479/5349-5350/19302-19309)),REJECT-DROP # 拦截 STUN 端口防 WebRTC 泄露
- DST-PORT,1337/2710/6881-6999/7777,REJECT-DROP # 拦截 P2P/BT 端口，保护节点避免收到机场 DMCA 警告

# 2. 基础系统与去广告服务 (匹配即抛弃，速度极快)
- DST-PORT,5228-5230,GoogleFCM
- RULE-SET,googlefcm,GoogleFCM
- DST-PORT,123,🟢 直连
- RULE-SET,ntp,🟢 直连
- RULE-SET,private,🟢 直连
- RULE-SET,private_ip,🟢 直连,no-resolve      # no-resolve: 匹配 IP 规则时不解析域名，提升性能
- RULE-SET,webrtc,WebRTC
- RULE-SET,ads-awavenue,⛔️ 拒绝
- RULE-SET,ads-mrxx007,⛔️ 拒绝
- RULE-SET,ads-all,⛔️ 拒绝
# - RULE-SET,ads-blackmatrix7,⛔️ 拒绝
- RULE-SET,httpdns-cn,⛔️ 拒绝
- RULE-SET,rejects,⛔️ 拒绝
- RULE-SET,rejects_ip,⛔️ 拒绝,no-resolve

# 3. 具体应用服务分流
- DOMAIN-SUFFIX,4d4y.com,日本
- RULE-SET,directs,Domestic
- RULE-SET,directs_ip,Domestic,no-resolve
- RULE-SET,porn-hub,Porn
- RULE-SET,mindgeek-porn,Porn
- RULE-SET,category-porn,Porn
- RULE-SET,ai-chat-!cn,Ai
