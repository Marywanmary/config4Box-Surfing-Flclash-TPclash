# ======================================================
# 本项目基于Telegram@破手机换盆回收二手富萝莉配置文件修改，
# 使用者需要具备基本网络常识，或者依靠AI分析故障问题的技能。
# 使用前请仔细阅读所有中文注释。
# 作者：ssll (更新日期：2026-06-17)
# ======================================================

# ======================================================
# 🛑 部署与排雷操作指南 (Box / Surfing 用户必读)
# ======================================================
# ⚠️ 致命冲突警告：
# 本配置文件兼容纯血 Mihomo 内核的所有客户端，可以与 RDP / Tailscale / Rustdesk / VPN 等共存。
# 但在同一台设备上，不要同时运行两套流量接管机制例如Flclash。
#
# 👉 Box / Surfing 手机端操作步骤：
# 1. 如果你决定使用 Box for Root / Surfing 模块 (无感静默运行)：
#    - 确保面板设置中关闭了【自动复写】。
#    - 找到地区自动代理组模板，启用⚠️ Smart 智能策略代码，注释或者删除掉⚠️ URL-Test 部分代码。
#    - 将本文件直接替换掉 Box 目录下的 config.yaml，然后重启模块。不要在手机上再打开 FlClash 去接管 VPN！
#
# ======================================================

# ======================================================
# 🔰 新手必读：代理大区选择指南 (如何选择最优节点)
# ------------------------------------------------------
# 🇭🇰 香港 (HK)：物理距离最近，延迟极低。适合日常网页浏览、游戏加速。⚠️ 缺点：风控极严，ChatGPT、TikTok 等通常会封锁香港 IP。
# 🇸🇬 狮城 (SG)：亚太核心枢纽。原生 IP 多，解锁流媒体能力极强（Netflix/Disney+），连接 Telegram 极速，风控相对宽松，推荐作为主力大区。
# 🇹🇼 台湾 (TW)：万能平衡点。速度快，能完美解锁各类区域限制内容，且 ChatGPT 等 AI 工具基本不封锁。
# 🇯🇵 日本 (JP)：亚洲互联网枢纽。适合二次元文化站(DMM/Pixiv)解锁，UDP 连通性好，适合语音通话(Discord)。
# 🇺🇸 美国 (US)：终极解锁方案。延迟较高(150ms+)，但遇到极其严格的区域限制(如 Claude、美国本土银行、原生 TikTok)时，请手动切至美国。
# 🇰🇷 韩国 (KR)：北方宽带(如联通)的物理外挂，延迟极低；拥有独占韩服游戏与本土流媒体解锁能力。⚠️ 缺点：路由两极分化严重，非原生 IP 风控极严，建议作为“战术备用”，不推荐作全局主力。
# 🇷🇺 俄罗斯 (RU)：特殊冷门大区。适合特定区域资源与网站访问，日常极少使用。
#
# 💡 【节点记忆机制生效提示】：
# 本配置已开启 `store-selected: true` 功能。你在 App 面板上首次为各大区或应用组手动选取了某个节点（或保持默认）后，该选择会永久保持生效并被内核自动记忆！即使重启手机、重启软件，你的选择都不会变，直到你在 App 中手动点击“清除缓存”或“删除记忆”。
# ======================================================

# ======================================================
# 📌 变量与锚点定义区 (预设模板，供下方订阅提供者模块复用，数量、名称务必保持一致)
# ======================================================

# ⬇️ 机场与优选节点订阅链接提取区
Sub01: &Sub01 "输入订阅链接"
Sub02: &Sub02 "输入订阅链接"
Sub03: &Sub03 "输入订阅链接"

BaiduProxy: &BaiduProxy "https://cdn.jsdelivr.net/gh/MeALiYeYe/ProxyConfigFiles@main/Mihomo/BaiduProxy.yaml"

# ⬇️ 连通性测速链接
ProxyTest: &ProxyTest "https://www.gstatic.com/generate_204"     # 境外节点测速用
DirecTest: &DirecTest "https://wifi.vivo.com.cn/generate_204"    # 境内节点测速用

# ⬇️ 节点名称正则过滤 
FilterHK: &FilterHK '(?i)(?:港|香港|🇭🇰|HK|Hong\s?Kong)'
FilterTW: &FilterTW '(?i)(?:台|台湾|🇼🇸|🇹🇼|TW|Taiwan)'
FilterSG: &FilterSG '(?i)(?:坡|新加坡|🇸🇬|SG|Singapore)'
FilterJP: &FilterJP '(?i)(?:日|日本|🇯🇵|JP|Japan)'
FilterKR: &FilterKR '(?i)(?:韩|韩国|🇰🇷|\bKR\b|KOR|Korea)'
FilterUS: &FilterUS '(?i)(?:美|美国|🇺🇸|US|States|America)'
FilterRU: &FilterRU '(?i)(?:俄|俄罗斯|莫斯科|🇷🇺|RU|Russia|Moscow)'
FilterCF: &FilterCF '(?i)(?:CF|Cloudflare|优选|移动|联通|电信)'
FilterOther: &FilterOther '^(?!.*(香港|台湾|新加坡|日本|美国|韩国|俄罗斯|🇭🇰|🇼🇸|🇨🇳|🇹🇼|🇸🇬|🇯🇵|🇺🇸|🇰🇷|🇷🇺|HK|TW|SG|JP|US|KR|RU|CF|Cloudflare|优选|移动|联通|电信))'
ExcludeFilter: &ExcludeFilter '(?i)(?:佣金|套餐|官网|官方|网址|售后|免翻|过期|剩余|到期|流量|更新|点外|重置|免流|使用|教程|优惠|超实惠|址|AFF|Days|Date|订阅|群组|TG)'

# ⬇️ 代理提供商通用模板 
Proxyer: &Proxyer
  type: http
  interval: 86400
  exclude-filter: *ExcludeFilter
  health-check:
    enable: true
    url: *ProxyTest
    interval: 600
  header:
    User-Agent:
    - "ClashMetaForAndroid/2.11.2.Meta"
    - "clash.meta"
    - "mihomo"

# ⬇️ 地区自动代理组模板 (默认启用进阶版：Smart 智能策略)
# ⚠️ 警告：仅限 Box / Surfing 用户使用！
# ⚠️ 警告：又或确定Flclash更新了包含 Smart 模块的 Mihomo Alpha 内核。
Smartp: &Smartp
  type: smart
  include-all-providers: true
  uselightgbm: true
  collectdata: false
  prefer-asn: true
  max-failed-times: 3
  url: *ProxyTest
  lazy: true
  hidden: true

# ⬇️ 境外手动选择组模板
Groupp: &Groupp
  type: select
  proxies:
  - 🟢 直连
  - 香港
  - 台湾
  - 狮城
  - 日本
  - 美国
  - 韩国
  - 俄罗斯
  - CF优选
  - 其他
  url: *ProxyTest
  lazy: true
  hidden: false

# ⬇️ 境内流转选择组模板
Groupd: &Groupd
  type: select
  proxies:
  - 🟢 直连
  - 广东
  - 江苏
  - 北京
  url: *DirecTest
  lazy: true
  hidden: false

# ⬇️ 规则集通用配置模板
rule-anchor:
  cla: &cla
    type: http
    behavior: classical
    format: yaml
    interval: 86400
  dom: &dom
    type: http
    behavior: domain
    format: mrs
    interval: 86400
  ipc: &ipc
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400

# ======================================================
# ⚙️ 基础静态代理组
# ======================================================
proxies:
- name: 🟢 直连
  type: direct
  udp: true
- name: ⛔️ 拒绝
  type: reject
- name: ⭕️ DNS_Hijack
  type: dns

# ======================================================
# ☁️ 订阅提供者模块，与上方的机场与优选节点订阅链接数量、名称保持一致
# ======================================================
proxy-providers:
  Sub01:
    <<: *Proxyer
    path: ./proxies/Sub01.yaml
    url: *Sub01
  Sub02:
    <<: *Proxyer
    path: ./proxies/Sub02.yaml
    url: *Sub02
  Sub03:
    <<: *Proxyer
    path: ./proxies/Sub03.yaml
    url: *Sub03
  BaiduProxy:
    <<: *Proxyer
    path: ./proxies/BaiduProxy.yaml
    url: *BaiduProxy

# ======================================================
# 🎯 应用路由分流组
# ======================================================
proxy-groups:
- name: Location
  <<: *Groupd
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bypass.png"
  # [作用]：虚拟定位。如需更改抖音/小红书IP属地，可切至广东、江苏、北京等。日常选"直连"。

- name: Domestic
  <<: *Groupd
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Domestic.png"
  # [作用]：国内日常流量。必须保持"直连"，否则国内 App 加载极慢且易触发异地登录风控。

- name: DNServer
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Filter.png"
  # [作用]：远程 DNS 解析通道。推荐选"香港/日本/台湾/狮城"，极大缩短海外网页首次打开的白屏时间。

# ------------------------------------------------------
# 🚀 AI 手动选区方案，对国际AI使用频率低的 Box / Surfing 用户可以注释或者删除掉# 🚀 深度优化：AI 智能解锁专区 (底层拨号测速降级方案)手动启用本段代码，实现Lightgbm模型智能优化。
# Flclash 用户在没有更新 Smart内核前不用考虑，直接默认。
# ------------------------------------------------------
- name: Ai
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png"
  # [作用]：AIGC(ChatGPT/Claude/Gemini)。建议选"美国/台湾/日本"。⚠️ 必须避开香港，否则封号或报错 Access Denied。

- name: Google
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png"
  # [作用]：谷歌全家桶。推荐选"香港/日本/台湾/狮城"。

- name: GoogleFCM
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@main/app/icon/GoogleFCM.svg"
  # [作用]：安卓系统级推送通知。推荐保持直连或香港，保证锁屏下耗电最低、收消息最快。

- name: Cloudflare
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Cloudflare.png"
  # [作用]：CF套壳网站。国内直连经常被墙，推荐选"香港/日本/台湾/狮城"。

- name: Github
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png"
  # [作用]：程序员专供。推荐选"香港/日本/台湾/狮城"。

- name: Youtube
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png"
  # [作用]：油管。建议本组选择 "CF优选" 节点，充分利用其免费大流量特性，避免主力机场套餐流量被过快消耗。如需 Premium 后台播放免广告，需选开通了该服务的国家(如美/日)。

- name: Media
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ForeignMedia.png"
  # [作用]：Netflix/Disney+等。推荐狮城/台湾/日本，解锁率最高。

- name: Porn
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Pornhub_1.png"
  # [作用]：成人内容流媒体视频通常需要耗费大量带宽。强烈建议本组选择 "CF优选" 节点，充分利用其免费大流量特性，避免主力机场套餐流量被过快消耗。

- name: Telegram
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png"
  # [作用]：TG。选狮城或香港，物理距离最近，发图最快。

- name: Reddit
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/CLorant/readme-social-icons@main/medium/colored/reddit.svg"
  # [作用]：推荐选"香港/日本/台湾/狮城"。

- name: Discord
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png"
  # [作用]：推荐选"香港/日本/台湾/狮城"。

- name: Tiktok
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/TikTok.png"
  # [作用]：国际版抖音。⚠️ 屏蔽了香港，必须选台/日/新/美。

- name: Emby
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Emby.png"
  # [作用]：一般为Emby私有仓库或者公益仓库，建议本组选择 "CF优选" 节点，充分利用其免费大流量特性，避免主力机场套餐流量被过快消耗。

- name: Microsoft
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png"
  # [作用]：微软服务(Office/Xbox)。强烈建议"直连"，避免被识别为异地盗号。

- name: Apple
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png"
  # [作用]：苹果服务(AppStore/iCloud)。建议"直连"，走国内 CDN 最快。

- name: Foreign
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png"
  # [作用]：未匹配到上面规则的所有海外流量，默认从这走。

- name: Final
  <<: *Groupp
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png"
  # [作用]：最终兜底（所有规则都没匹配上的未知流量）。

- name: WebRTC
  type: select
  proxies:
  - ⛔️ 拒绝
  - ⭕️ DNS_Hijack
  - 🟢 直连
  icon: "https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@main/app/icon/WebRTC.svg"
  # [面板建议]: WebRTC 防泄漏开关。平时保持"拒绝"，使用网页视频会议(如Zoom网页版)没声音/画面时再切"直连"。

