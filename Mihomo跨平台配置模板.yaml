# ==========================================================
# ===== Mihomo内核跨平台配置模板
# ===== 模板适用于 vernesong 分支内核
# ===== 目前适配 Box / Surfing / ShellCrash，Flclash不支持Smart内核，需要单独配置
# ===== 注意：Zygisk/Root模块需开启对应端口 (默认均关闭)
# ===== 作者：ssll     2026.06.23
# ==========================================================

# ==============================================================================
# 01. 订阅源定义 (Provider Resources)
# ==============================================================================
# 🎯 以下为用户提供的订阅链接，Sub00一般为机场订阅，SubCF为Cloudflare白嫖Edgetunnel，数量自行调整。
Sub00: &Sub00 "在此输入订阅链接"
SubCF01: &SubCF01 "在此输入订阅链接"
SubCF02: &SubCF02 "在此输入订阅链接"

# 🎯 以下为国内虚拟定位的百度代理订阅，不要改动。
BaiduProxy: &BaiduProxy "https://cdn.jsdelivr.net/gh/MeALiYeYe/ProxyConfigFiles@main/Mihomo/BaiduProxy.yaml"

# 💡 国内国外测速链接
ProxyTest: &ProxyTest "https://www.gstatic.com/generate_204"
DirecTest: &DirecTest "https://wifi.vivo.com.cn/generate_204"


# ==============================================================================
# 02. 节点过滤正则 (Regex Filters)
# ==============================================================================
FilterHK: &FilterHK '(?i)(?:港|香港|🇭🇰|HK|Hong\s?Kong)'
FilterTW: &FilterTW '(?i)(?:台|台湾|🇼🇸|🇹🇼|TW|Taiwan)'
FilterSG: &FilterSG '(?i)(?:坡|新加坡|🇸🇬|SG|Singapore)'
FilterJP: &FilterJP '(?i)(?:日|日本|🇯🇵|JP|Japan)'
FilterUS: &FilterUS '(?i)(?:美|美国|🇺🇸|US|States|America)'

# 💡 韩俄正则留底备用（当前已并入“其它国家”兜底组）
FilterKR: &FilterKR '(?i)(?:韩|韩国|🇰🇷|\bKR\b|KOR|Korea)'
FilterRU: &FilterRU '(?i)(?:俄|俄罗斯|莫斯科|🇷🇺|RU|Russia|Moscow)'

# 🌍 其它国家兜底节点：利用负向断言，仅排除港台日新美，保留包含韩、俄在内的其他所有剩余节点
FilterRest: &FilterRest '^(?!.*(?i)(?:港|香港|🇭🇰|HK|Hong\s?Kong|台|台湾|🇼🇸|🇹🇼|TW|Taiwan|坡|新加坡|🇸🇬|SG|Singapore|日|日本|🇯🇵|JP|Japan|美|美国|🇺🇸|US|States|America)).*'

ExcludeFilter: &ExcludeFilter '(?i)(?:佣金|套餐|官网|官方|网址|售后|免翻|过期|剩余|到期|流量|更新|点外|重置|免流|使用|教程|优惠|超实惠|址|AFF|Days|Date)'

# ==============================================================================
# 03. 高级 YAML 锚点模板 (Advanced YAML Anchors)
# ==============================================================================
Proxyer: &Proxyer
  type: http
  interval: 86400
  exclude-filter: *ExcludeFilter
  health-check:
    enable: true
    url: *ProxyTest
    interval: 600
  header:
    User-Agent: ["ClashMetaForAndroid/2.11.2.Meta", "clash.meta", "mihomo"]

Smart_Premium: &Smart_Premium
  type: smart
  use: [Sub00]
  interval: 300
  uselightgbm: true
  collectdata: false
  prefer-asn: true
  max-failed-times: 3
  url: *ProxyTest
  lazy: true
  hidden: true

Smart_CF: &Smart_CF
  type: smart
  use: [SubCF01, SubCF02]
  interval: 300
  uselightgbm: true
  collectdata: false
  prefer-asn: true
  max-failed-times: 3
  url: *ProxyTest
  lazy: true
  hidden: true

Smart_Domestic: &Smart_Domestic
  type: smart
  use: [BaiduProxy]
  interval: 300
  uselightgbm: true
  collectdata: false
  max-failed-times: 3
  url: *DirecTest
  lazy: true
  hidden: true

Groupd: &Groupd
  type: select
  proxies: [🟢 直连, 江苏, 广东, 北京]
  url: *DirecTest
  lazy: true
  hidden: false

rule-anchor:
  cla: &cla {type: http, behavior: classical, format: yaml, interval: 86400}
  dom: &dom {type: http, behavior: domain, format: mrs, interval: 86400}
  ipc: &ipc {type: http, behavior: ipcidr, format: mrs, interval: 86400}

# ==============================================================================
# 04. 代理与提供商定义 (Proxies & Providers)
# ==============================================================================
proxies:
- name: 🟢 直连
  type: direct
  udp: true
- name: ⛔️ 拒绝
  type: reject
- name: ⭕️ DNS_Hijack
  type: dns

proxy-providers:
  Sub00:
    <<: *Proxyer
    path: ./proxies/Sub00.yaml
    url: *Sub00
  SubCF01:
    <<: *Proxyer
    path: ./proxies/SubCF01.yaml
    url: *SubCF01
  SubCF02:
    <<: *Proxyer
    path: ./proxies/SubCF02.yaml
    url: *SubCF02
  BaiduProxy:
    <<: *Proxyer
    path: ./proxies/BaiduProxy.yaml
    url: *BaiduProxy
    health-check:
      enable: true
      url: *DirecTest
      interval: 600

# ==============================================================================
# 05. 核心策略组 (Proxy Groups)
# ==============================================================================
proxy-groups:
# ------------------------------------------------------------------------------
# 5.1 【底层支撑层】纯净池/流量池分流与隐藏
# ------------------------------------------------------------------------------
# 🧠 [Pre] 纯净高阶节点：智能测速组
- name: Pre-香港
  <<: *Smart_Premium
  filter: *FilterHK
- name: Pre-台湾
  <<: *Smart_Premium
  filter: *FilterTW
- name: Pre-狮城
  <<: *Smart_Premium
  filter: *FilterSG
- name: Pre-日本
  <<: *Smart_Premium
  filter: *FilterJP
- name: Pre-美国
  <<: *Smart_Premium
  filter: *FilterUS
- name: Pre-其它国家
  <<: *Smart_Premium
  filter: *FilterRest
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_Nations.png"

# 🧠 [CF] 大流量白嫖节点：智能测速组
- name: CF-香港
  <<: *Smart_CF
  filter: *FilterHK
- name: CF-台湾
  <<: *Smart_CF
  filter: *FilterTW
- name: CF-狮城
  <<: *Smart_CF
  filter: *FilterSG
- name: CF-日本
  <<: *Smart_CF
  filter: *FilterJP
- name: CF-美国
  <<: *Smart_CF
  filter: *FilterUS
- name: CF-其它国家
  <<: *Smart_CF
  filter: *FilterRest
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_Nations.png"

# 🧠 国内虚拟定位智能测速组
- name: 江苏
  <<: *Smart_Domestic
  filter: '(?i)(?:南京|苏州)'
- name: 广东
  <<: *Smart_Domestic
  filter: '(?i)(?:广州|深圳)'
- name: 北京
  <<: *Smart_Domestic
  filter: '(?i)(?:北京|保定)'

# ------------------------------------------------------------------------------
# 5.2 【顶层业务组】(直接面向用户 UI 面板)
# ------------------------------------------------------------------------------
- name: Location
  <<: *Groupd
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bypass.png"

- name: Domestic
  <<: *Groupd
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Domestic.png"

- name: DNServer
  type: url-test
  use: [Sub00]
  url: *ProxyTest
  interval: 300
  tolerance: 50
  icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/DNS.png"

# WebRTC 防泄漏开关。平时保持"拒绝"，使用网页视频会议(如Zoom网页版)没声音/画面时再切"直连"。
- name: WebRTC
  type: select
  proxies:
  - ⛔️ 拒绝
  - ⭕️ DNS_Hijack
  - 🟢 直连
