# ==============================================================================
# 08. 运行环境与端口适配区 (Environment & Ports)
# ==============================================================================
# 💡 【GUI 应用层】( Clash Meta for Android / Surfboard 等)
# - 适配指南：无需修改本配置。GUI 软件面板中设置拥有最高优先级，会自动覆写下方端口。

# 💡 【软路由环境】(OpenClash 等)
# - 适配指南：无需修改本配置。OpenClash 的 LuCI 控制台会自动注入专属端口并接管 Dnsmasq。

# 💡 【软路由环境】(ShellCrash )
# - 适配指南：需留意面板默认端口为9999，与其它软件不同。
# external-controller: 0.0.0.0:9999

# 💡 【Magisk/KernelSU 模块层】(Box / Surfing 等)
# - 适配指南：必须取消对应模块的端口注释！
# ==============================================================================
# ⚠️ [Box 模块] 默认端口组 (如使用，需注释下方 Surfing 并取消下方三行注释)
# mixed-port: 7890
# redir-port: 9797
# tproxy-port: 9898

# ⚠️ [Surfing 模块] 默认端口组 (如使用，需注释上方 Box 并取消下方三行注释)
# mixed-port: 7890
# redir-port: 7891
# tproxy-port: 1536

port: 8080
socks-port: 1080
ipv6: true
mode: rule
log-level: warning
unified-delay: true
tcp-concurrent: true
allow-lan: true
external-controller: 0.0.0.0:9090
external-ui: "./ui/Zash"
external-ui-url: "https://cdn.jsdelivr.net/gh/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip"
secret: ""
skip-auth-prefixes:
- 10.0.0.1/8
- 127.0.0.1/8
- 192.168.0.1/16

# ==============================================================================
# 09. 系统底层基础设置 (System & Geo Database)
# ==============================================================================
geo-auto-update: true
geo-update-interval: 360
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"
  geosite: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  asn: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

lgbm-auto-update: true
lgbm-update-interval: 360
lgbm-url: "https://cdn.jsdelivr.net/gh/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin"

profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100

ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30

# ==============================================================================
# 10. 流量嗅探与 TUN 虚拟网卡 (Sniffer & TUN)
# ==============================================================================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443, 5228-5230]
    QUIC:
      ports: [443, 8443]
  force-domain:
  - "+.v2ex.com"
  skip-domain:
  - "+.local"
  - "+.lan"
  - "localhost"
  - "Mijia Cloud"
  - "miwifi.com"
  - "+.ts.net"
  - "+.rustdesk.com"
  - "+.anydesk.com"
  - "+.teamviewer.com"
  - "+.oray.com"
  - "+.oray.net"
  - "+.easytier.top"

tun:
  enable: true
  device: Mihomo
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-detect-interface: true
  strict-route: true

# ==============================================================================
# 11. 域名解析系统与本地宿主拦截 (DNS & Hosts)
# ==============================================================================
dns:
  enable: true
  listen: :1053
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fdfe:dcba:9876::/64
  fake-ip-filter-mode: rule
  fake-ip-filter:
  - RULE-SET,googlefcm,real-ip
  - RULE-SET,ntp,real-ip
  - RULE-SET,directs,real-ip
  - RULE-SET,cn,real-ip
  - MATCH,fake-ip

  cndns: &cndns
  - 223.5.5.5
  - 223.6.6.6
  - "2400:3200::1"
  - "2400:3200:baba::1"

  cndoh: &cndoh
  - 'quic://dns.alidns.com#🟢 直连'
  - 'https://dns.alidns.com/dns-query#🟢 直连'

  cgdoh: &cgdoh
  - 'https://dns.google/dns-query#DNServer'
  - 'https://cloudflare-dns.com/dns-query#DNServer'

  default-nameserver: *cndns
  direct-nameserver: *cndns
  proxy-server-nameserver: *cndoh

  nameserver-policy:
    'eu.cc': *cgdoh
    'RULE-SET:ads-awavenue,ads-mrxx007,ads-all,rejects': rcode://name_error
#     'RULE-SET:ads-awavenue,ads-mrxx007,ads-all,ads-blackmatrix7,rejects': rcode://name_error
    'RULE-SET:cn,apple,microsoft,directs': *cndoh
    'RULE-SET:geolocation-!cn,proxys': *cgdoh
  nameserver: *cgdoh

hosts:
  raw.githubusercontent.com:
